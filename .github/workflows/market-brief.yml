name: Market brief

# Generates the market-narrative brief Mon/Wed/Fri and commits it to
# data/briefs/, which triggers a Vercel redeploy. Also runnable on demand
# from the Actions tab (workflow_dispatch).
#
# GitHub's free cron is unreliable — it queues/skips scheduled runs under
# load (it missed three days running). So this fires at THREE morning slots
# and a guard makes them idempotent: the first slot GitHub actually honors
# writes the brief; every later slot sees today's file already there and
# no-ops. First-honored-slot wins, no duplicates, near-zero cost for the
# skipped slots. A manual "Run workflow" always regenerates (force), even
# if today's brief already exists.

on:
  schedule:
    # Mon / Wed / Fri. Times are fixed UTC (GitHub cron has no DST awareness);
    # these are current Pacific Daylight Time (UTC-7) — 7:17, 8:47, 10:17am PT.
    # Once clocks fall back to PST in November they read one hour earlier;
    # bump each hour by 1 then if the morning window matters.
    - cron: "17 14 * * 1,3,5" # ~7:17am PT
    - cron: "47 15 * * 1,3,5" # ~8:47am PT (backup)
    - cron: "17 17 * * 1,3,5" # ~10:17am PT (backup)
  workflow_dispatch:
    inputs:
      model:
        description: "Model override (e.g. claude-sonnet-5 for lower cost)"
        required: false
        default: ""

concurrency:
  group: market-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Guard — skip a scheduled slot if today's brief already exists
        id: guard
        run: |
          TODAY=$(date -u +%F)
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "data/briefs/$TODAY.md" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Brief for $TODAY already exists — skipping this scheduled slot."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: "20"

      - name: Install script dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm install --prefix scripts

      - name: Generate market brief
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: ${{ github.event.inputs.model }}
        run: node scripts/market-brief.mjs

      - name: Commit brief if changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "sofi-market-bot"
          git config user.email "actions@github.com"
          git add data/briefs
          if git diff --staged --quiet; then
            echo "No brief changes to commit."
          else
            git commit -m "Market brief ${{ steps.guard.outputs.today }}"
            git push
          fi
