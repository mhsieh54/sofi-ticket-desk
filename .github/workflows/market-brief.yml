name: Market brief

# Generates the market-narrative brief Mon + Thu and commits it to
# data/briefs/, which triggers a Vercel redeploy. Also runnable on demand
# from the Actions tab (workflow_dispatch).
#
# GitHub's free cron is unreliable — it queues/skips scheduled runs under
# load (it missed three days running). So this fires at THREE morning slots
# and a guard makes them idempotent: the first slot GitHub actually honors
# writes the brief; every later slot sees today's file already there and
# no-ops. First-honored-slot wins, no duplicates, near-zero cost for the
# skipped slots. A manual "Run workflow" always regenerates (force), even
# if today's brief already exists.

on:
  schedule:
    # Mon + Thu (twice a week — brackets the weekend event/demand surge).
    # Times are fixed UTC (GitHub cron has no DST awareness); these are current
    # Pacific Daylight Time (UTC-7) — 7:17, 8:47, 10:17am PT. Once clocks fall
    # back to PST in November they read one hour earlier; bump each hour by 1
    # then if the morning window matters.
    - cron: "17 14 * * 1,4" # ~7:17am PT
    - cron: "47 15 * * 1,4" # ~8:47am PT (backup)
    - cron: "17 17 * * 1,4" # ~10:17am PT (backup)
  workflow_dispatch:
    inputs:
      model:
        description: "Model override (e.g. claude-sonnet-5 for lower cost)"
        required: false
        default: ""
  # Lets a Contents-scoped token trigger a rerun via the repository_dispatch
  # API (workflow_dispatch needs Actions scope; repository_dispatch doesn't).
  repository_dispatch:
    types: [run-brief]

concurrency:
  group: market-brief
  cancel-in-progress: false

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can rebase before pushing

      - name: Guard — skip a scheduled slot if today's brief already exists
        id: guard
        run: |
          TODAY=$(date -u +%F)
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "data/briefs/$TODAY.md" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Brief for $TODAY already exists — skipping this scheduled slot."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: "20"

      - name: Install script dependencies
        if: steps.guard.outputs.skip != 'true'
        run: npm install --prefix scripts

      - name: Generate market brief
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: ${{ github.event.inputs.model || github.event.client_payload.model || '' }}
        run: node scripts/market-brief.mjs

      - name: Commit brief if changed
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "sofi-market-bot"
          git config user.email "actions@github.com"
          git add data/briefs data/brief-notes.json
          if git diff --staged --quiet; then
            echo "No brief changes to commit."
          else
            git commit -m "Market brief ${{ steps.guard.outputs.today }}"
            # The dashboard may have pushed inventory edits since checkout. The
            # brief files are disjoint from inventory.json, so rebase + retry
            # lands cleanly rather than failing on a non-fast-forward push.
            for attempt in 1 2 3; do
              git fetch origin master
              git rebase origin/master || { git rebase --abort; echo "unexpected conflict"; exit 1; }
              if git push; then echo "pushed"; break; fi
              echo "push rejected, retrying ($attempt)…"
              sleep 3
            done
          fi
